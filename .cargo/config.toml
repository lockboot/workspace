# Shared Cargo configuration for the whole Lock.Boot workspace (loaded via CARGO_HOME, and via
# hierarchical discovery inside any sub-repo). It carries ONLY workspace-wide settings; rustflags and
# `[build] target` live in each repo's own .cargo/config.toml, for two reasons:
#
#   - CI checks out each repo ALONE (no workspace parent, CARGO_HOME redirected), so anything a build
#     needs must be in the repo, or CI and local diverge.
#   - Cargo CONCATENATES `rustflags` across config files (a sub-repo's does NOT override this one), so
#     defining flags both here and in a repo would double them and change the compiled bytes.
#
# No `[build] target` here either: it would break the gnu-host repos (vaportpm, vaportpm-zk) and the
# Python site (wavebend.org). Musl repos set their own; gnu-host repos opt in with `--target musl`.

[env]
# Reproducible builds by default across every repo.
SOURCE_DATE_EPOCH = "0"
